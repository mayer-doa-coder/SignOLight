# render.yaml - Render.com deployment config
# Three services: Express API + Python NLP + React frontend

services:
  # ── Backend (Express API on Render) ──────────────────────────────
  - type: web
    name: signlearn-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false          # Set this manually in Render dashboard
      - key: FRONTEND_URL
        sync: false          # Set to your Vercel frontend URL
      - key: NLP_SERVICE_URL
        sync: false          # Set to signlearn-nlp Render URL (e.g. https://signlearn-nlp.onrender.com)

  # ── NLP Microservice (Python FastAPI + spaCy, Phase B) ───────────
  # Note: free tier cold-starts take ~30s. The Node backend falls back gracefully
  # to Groq gloss while the Python service warms up.
  - type: web
    name: signlearn-nlp
    runtime: docker
    rootDir: backend_nlp
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: "8000"

  # ── Frontend (Static React on Render) ────────────────────────────
  - type: web
    name: signlearn-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    plan: free
    envVars:
      - key: REACT_APP_API_URL
        sync: false          # Set to your Render backend URL

    routes:
      - type: rewrite
        source: /*
        destination: /index.html
